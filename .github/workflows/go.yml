name: Go Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "**" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOFLAGS: -buildvcs=false

jobs:
  go-build:
    runs-on: [ self-hosted, Linux, Docker, Large ]
    container: golang:1.26.2-alpine
    defaults:
      run:
        working-directory: ./go
    steps:
      - uses: actions/checkout@v6
        with:
          path: 'go'
          fetch-depth: '2'

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          cache: false
          cache-dependency-path: |
            **/go.sum
            **/go.mod

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...

      - name: Coverage
        run: go test -cover ./...
